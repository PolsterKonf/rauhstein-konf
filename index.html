/* â”€â”€ Lightbox overlay mit blur â”€â”€ */
.lightbox-overlay{
  position:fixed;inset:0;
  background:rgba(18,28,22,.34);
  backdrop-filter:blur(8px) saturate(120%);

}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.lightbox-box{
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(14px) saturate(120%);
  -webkit-backdrop-filter:blur(14px) saturate(120%);
  border:1px solid rgba(63,102,86,.08);

  box-shadow:0 18px 46px rgba(23,42,32,.1),0 4px 12px rgba(23,42,32,.04);
  max-height:calc(100vh - 2rem);overflow:hidden;
  display:flex;flex-direction:column;
  margin:0 auto;
  animation:slideUp .22s cubic-bezier(.4,0,.2,1);
}
.lightbox-scroll{
  overflow-y:auto;overflow-x:hidden;flex:1;min-height:0;padding-right:.3rem;
}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

.lightbox-close{
  position:absolute;top:14px;right:14px;
  width:28px;height:28px;border-radius:50%;
  background:#FFFFFF;border:1px solid rgba(63,102,86,.1);
  font-size:13px;cursor:pointer;color:#5C695F;line-height:1;

}

.sidebar-form-preview{

const imageProbeCache = new Map();
const imageResolutionCache = new Map();

const probeImageUrl = (url) => new Promise((resolve) => {
  if (!url) {
    resolve(false);
    return;
  }
  if (imageProbeCache.has(url)) {
    resolve(imageProbeCache.get(url));
    return;
  }
  const img = new Image();
  img.onload = () => {
    imageProbeCache.set(url, true);
    resolve(true);
  };
  img.onerror = () => {
    imageProbeCache.set(url, false);
    resolve(false);
  };
  img.src = url;
});

const resolveFirstWorkingImage = async (candidates) => {
  const cacheKey = candidates.join("|");
  if (imageResolutionCache.has(cacheKey)) return imageResolutionCache.get(cacheKey);
  for (const url of candidates) {
    if (await probeImageUrl(url)) {
      imageResolutionCache.set(cacheKey, url);
      return url;
    }
  }
  imageResolutionCache.set(cacheKey, "");
  return "";
};

const calculateMetrics = (form, dims) => {
  const a = parseFloat(dims.a || 0) / 100;
  const b = parseFloat(dims.b || 0) / 100;
  const c = parseFloat(dims.c || 0) / 100;
  const d = parseFloat(dims.d || 0) / 100;
  const e = parseFloat(dims.e || 0) / 100;

  if (form?.id === "9" || form?.id === "klapp-2") {
    if (!a || !b || !c || !d) return { surface: 0, volume: 0 };
    return {
      surface: (2 * (a * b + a * c + b * c)) + (2 * (a * b + a * d + b * d)),
      volume: (a * b * c) + (a * b * d),
    };
  }

  if (form?.id === "22" || form?.id === "klapp-3") {
    if (!a || !b || !c || !d || !e) return { surface: 0, volume: 0 };
    return {
      surface:
        (2 * (a * b + a * c + b * c)) +
        (2 * (a * b + a * d + b * d)) +
        (2 * (a * b + a * e + b * e)),
      volume: (a * b * c) + (a * b * d) + (a * b * e),
    };
  }

  if (!a || !b || !c) return { surface: 0, volume: 0 };

  return {
    surface: 2 * (a * b + a * c + b * c),
    volume: a * b * c,
  };
};

  return [...custom, ...exts.map(ext => `${FABRIC_IMAGE_BASE_URL}/${fabric.id}.${ext}`)];
};
